name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  discover-modules:
    name: Discover modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.discover.outputs.modules }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover modules
        id: discover
        shell: bash
        run: |
          modules_json="$(
            make modules \
              | jq -R . \
              | jq -s -c .
          )"

          echo "modules=$modules_json" >> "$GITHUB_OUTPUT"
          echo "Discovered modules: $modules_json"

  build:
    name: Build (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: discover-modules

    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-modules.outputs.modules) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Build module
        run: make build ${{ matrix.module }}

  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: discover-modules

    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-modules.outputs.modules) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Test module
        run: make test ${{ matrix.module }}

  lint:
    name: Lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: discover-modules

    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-modules.outputs.modules) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Install tools
        run: make install-tools

      - name: Lint module
        run: make lint ${{ matrix.module }}