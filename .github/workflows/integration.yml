name: Integration

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  discover-integration-modules:
    name: Discover integration modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.discover.outputs.modules }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover integration modules
        id: discover
        shell: bash
        run: |
          modules_json="$(
            make modules \
              | while IFS= read -r module; do
                  if [ -d "tests/modules/$module" ]; then
                    printf '%s\n' "$module"
                  fi
                done \
              | jq -R . \
              | jq -s -c .
          )"

          echo "modules=$modules_json" >> "$GITHUB_OUTPUT"
          echo "Discovered integration modules: $modules_json"

  integration:
    name: Integration (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: discover-integration-modules

    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-integration-modules.outputs.modules) }}

    services:
      chromium:
        image: ghcr.io/montferret/chromium:latest
        options: --add-host=host.docker.internal:host-gateway
        ports:
          - 9222:9222

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Install Ferret Lab
        run: |
          GOBIN="$GITHUB_WORKSPACE" go install github.com/MontFerret/lab/v2@v2.0.0-alpha.21
          "$GITHUB_WORKSPACE/lab" version

      - name: Add Ferret Lab to PATH
        run: echo "$GITHUB_WORKSPACE" >> "$GITHUB_PATH"

      - name: Resolve Lab static host on runner
        run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      - name: Build runtime
        run: make build ${{ matrix.module }}

      - name: Run integration tests
        env:
          LAB_SERVE_HOST: host.docker.internal
          LAB_SERVE_BIND: 0.0.0.0
        run: make test-integration ${{ matrix.module }}

  postgres-integration:
    name: Postgres Integration (db/postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ferret
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: ferret
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U ferret -d ferret"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Run Postgres integration tests
        working-directory: modules/db/postgres
        env:
          GOWORK: "off"
          POSTGRES_DSN: "postgres://ferret:secret@127.0.0.1:${{ job.services.postgres.ports[5432] }}/ferret?sslmode=disable"
        run: go test ./...
